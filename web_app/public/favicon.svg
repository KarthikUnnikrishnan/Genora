<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2D7A4F"/>
      <stop offset="100%" stop-color="#4CAF78"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="64" height="32" rx="14" fill="url(#shine)"/>

  <!-- Pill shape (left half filled = generic) -->
  <g transform="translate(32,32) rotate(-35)">
    <!-- Pill outline -->
    <rect x="-18" y="-8" width="36" height="16" rx="8" fill="none" stroke="white" stroke-width="2.5"/>
    <!-- Left cap filled -->
    <path d="M-18,-8 Q-26,-8 -26,0 Q-26,8 -18,8 L0,8 L0,-8 Z" fill="white" opacity="0.95"/>
    <!-- Divider line -->
    <line x1="0" y1="-8" x2="0" y2="8" stroke="url(#bg)" stroke-width="1.5"/>
  </g>

  <!-- Small leaf/cross accent top-right -->
  <g transform="translate(47,17)">
    <line x1="0" y1="-5" x2="0" y2="5" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <line x1="-5" y1="0" x2="5" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
